<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlagClaim — Historique</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

  <header>
    <div class="nav-brand">
      <span class="nav-logo">🏴</span>
      <span class="nav-title">FlagClaim</span>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">🗺️ Carte</a>
      <a href="classements.html" class="nav-link">🏆 Classements</a>
      <a href="historique.html" class="nav-link active">📜 Historique</a>
      <a href="index.html#waitlist" class="nav-link">🌍 V2</a>
    </nav>
    <div class="nav-right">
      <div class="nav-search">
        <input type="text" id="search-pseudo" placeholder="🔍 Ton pseudo..." />
        <button onclick="searchPseudo()">Chercher</button>
      </div>
    </div>
  </header>

  <main class="page-content">

    <h1 class="page-title">📜 Historique</h1>

    <!-- Filtres -->
    <div class="filters-bar">
      <select id="filter-country" onchange="loadHistorique()">
        <option value="">🌍 Tous les pays</option>
      </select>
      <select id="filter-status" onchange="loadHistorique()">
        <option value="active">✅ Actifs</option>
        <option value="ejected">⚔️ Éjectés</option>
        <option value="">📋 Tous</option>
      </select>
      <select id="filter-sort" onchange="loadHistorique()">
        <option value="planted_at.desc">🕐 Plus récents</option>
        <option value="planted_at.asc">⏳ Plus anciens</option>
        <option value="survival_days.desc">👑 Survie la plus longue</option>
      </select>
    </div>

    <!-- Compteur -->
    <div id="hist-count" class="hist-count"></div>

    <!-- Liste -->
    <div id="hist-list" class="hist-list">Chargement...</div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const countryNames = {
      FR:'France', DE:'Allemagne', GB:'Royaume-Uni', IT:'Italie',
      ES:'Espagne', PT:'Portugal', BE:'Belgique', NL:'Pays-Bas',
      PL:'Pologne', SE:'Suède', NO:'Norvège', DK:'Danemark',
      FI:'Finlande', GR:'Grèce', RO:'Roumanie', CZ:'Tchéquie',
      AT:'Autriche', CH:'Suisse', HU:'Hongrie', SK:'Slovaquie',
      HR:'Croatie', SI:'Slovénie', RS:'Serbie', BG:'Bulgarie',
      UA:'Ukraine', BY:'Biélorussie', MD:'Moldavie', LT:'Lituanie',
      LV:'Lettonie', EE:'Estonie', AL:'Albanie', MK:'Macédoine',
      BA:'Bosnie', ME:'Monténégro', IE:'Irlande', LU:'Luxembourg',
      MT:'Malte', CY:'Chypre', IS:'Islande', TR:'Turquie', XK:'Kosovo'
    };

    function getFlagEmoji(code) {
      if (!code) return '🏴';
      return code.toUpperCase().split('').map(c =>
        String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)
      ).join('');
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60)    return "à l'instant";
      if (diff < 3600)  return `il y a ${Math.floor(diff/60)} min`;
      if (diff < 86400) return `il y a ${Math.floor(diff/3600)}h`;
      return `il y a ${Math.floor(diff/86400)} jours`;
    }

    // Remplit le dropdown pays
    async function loadCountryFilter() {
      const countries = await sbGet('countries', 'select=code,name&order=name.asc');
      const select    = document.getElementById('filter-country');
      if (countries) {
        countries.forEach(c => {
          const opt  = document.createElement('option');
          opt.value  = c.code;
          opt.text   = `${getFlagEmoji(c.code)} ${c.name}`;
          select.appendChild(opt);
        });
      }
    }

    async function loadHistorique() {
      const country = document.getElementById('filter-country').value;
      const status  = document.getElementById('filter-status').value;
      const sort    = document.getElementById('filter-sort').value;

      let params = `select=*&order=${sort}&limit=50`;
      if (country) params += `&country_code=eq.${country}`;
      if (status)  params += `&status=eq.${status}`;

      const spots = await sbGet('spots', params);
      const list  = document.getElementById('hist-list');
      const count = document.getElementById('hist-count');

      if (!spots || spots.length === 0) {
        list.innerHTML  = '<p class="no-data">Aucun résultat.</p>';
        count.textContent = '';
        return;
      }

      count.textContent = `${spots.length} résultat${spots.length > 1 ? 's' : ''}`;

      list.innerHTML = spots.map(spot => {
        const flag    = getFlagEmoji(spot.flag_origin);
        const country = countryNames[spot.country_code] || spot.country_code;
        const cflag   = getFlagEmoji(spot.country_code);
        const days    = Math.floor((Date.now() - new Date(spot.planted_at)) / 86400000);
        const isActive = spot.status === 'active';

        return `
          <div class="hist-item ${isActive ? '' : 'hist-ejected'}">
            <div class="hist-flags">
              <span class="hist-origin">${flag}</span>
              <span class="hist-arrow">→</span>
              <span class="hist-country">${cflag}</span>
            </div>
            <div class="hist-info">
              <span class="hist-pseudo">${spot.pseudo || 'Anonyme'}</span>
              <span class="hist-location">${country}</span>
            </div>
            <div class="hist-meta">
              <span class="hist-status ${isActive ? 'status-active' : 'status-ejected'}">
                ${isActive ? '✅ Actif' : '⚔️ Éjecté'}
              </span>
              <span class="hist-days">${days} jour${days > 1 ? 's' : ''}</span>
            </div>
            <div class="hist-price">${spot.current_price}€</div>
          </div>
        `;
      }).join('');
    }

    function searchPseudo() {
      const pseudo = document.getElementById('search-pseudo').value.trim();
      if (!pseudo) return;
      window.location.href = `historique.html?pseudo=${pseudo}`;
    }

    // Init
    loadCountryFilter().then(() => {
      const params = new URLSearchParams(window.location.search);
      const pseudo = params.get('pseudo');
      if (pseudo) {
        document.getElementById('search-pseudo').value = pseudo;
      }
      loadHistorique();
    });
  </script>

</body>
</html>
